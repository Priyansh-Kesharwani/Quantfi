name: refactor-math-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  refactor-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pandas pyyaml scipy pyarrow
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Create refactor snapshot (if missing)
        run: |
          python3 scripts/create_refactor_snapshot.py --symbols SPY --start 2020-01-01 --end 2023-12-31 || true
      - name: Run refactor checks
        run: |
          chmod +x scripts/run_refactor_checks.sh
          ./scripts/run_refactor_checks.sh
