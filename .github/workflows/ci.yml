name: CI

on:
  push:
    branches: [main, master, "feature/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install black ruff isort mypy types-PyYAML types-requests

      - name: Black check
        run: black --check --config pyproject.toml .

      - name: Ruff check
        run: ruff check --config pyproject.toml .

      - name: Isort check
        run: isort --check-only --profile black --line-length 100 .

      - name: Mypy (core packages)
        run: mypy --config-file pyproject.toml backend domain infrastructure services scoring

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements-bot.txt

      - name: Run pytest
        env:
          PYTHONPATH: "."
        run: pytest tests -q --tb=short --junitxml=test-results/pytest.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: test-results/

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint (ESLint)
        run: yarn eslint src/ --max-warnings 0 || true

      - name: Run tests
        run: yarn test --watchAll=false --ci
        env:
          CI: true

  security-check:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-0 || true
