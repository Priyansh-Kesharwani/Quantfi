# CPCV + MFBO tuning pipeline config
# Usage: python scripts/tune.py --config config/tuning_cpcv.yml

data:
  symbols: ["SPY", "AAPL"]
  start_date: "2018-01-01"
  end_date: "2024-01-01"

cpcv:
  n_folds: 5
  k_test: 2
  horizon_bars: 20
  embargo_bars: 24

mfbo:
  n_trials: 50
  search_space:
    entry_score_threshold: [50, 55, 60, 65, 70, 75, 80]
    max_positions: [3, 5, 10, 15]
    max_holding_days: [30, 60, 90, 120, 180, 252]
    atr_trail_mult: [2.0, 2.5, 3.0]
    use_atr_stop: [true, false]
    min_holding_days: [0, 5, 10]
    entry_confirmation_bars: [1, 2, 3]
    slippage_bps: [1, 3, 5]
    cost_class: ["US_EQ_FROM_IN", "US_EQ_DIRECT"]
    # Regime and mode
    scoring_mode: ["mean_reversion", "adaptive"]
    min_invested_fraction: [0.0, 0.1, 0.2, 0.3]
    trend_weight_tech: [0.4, 0.5, 0.6]
    # Category weights (macro_fx = 1 - sum)
    weight_technical: [0.3, 0.4, 0.5]
    weight_volatility: [0.1, 0.2, 0.3]
    weight_statistical: [0.1, 0.2, 0.3]
    # Top scoring magnitudes
    sma_below_bonus: [10, 15, 20]
    rsi_oversold_bonus: [15, 20, 25]
    drawdown_severe_bonus: [20, 25, 30]
    adx_high_penalty: [0, 5, 10]
    extreme_low_bonus: [35, 45, 55]
    drawdown_flat_penalty: [5, 10, 15]
  fidelity_spec:
    low:
      cost: 1.0
    high:
      cost: 5.0

gt_turnover_lambda: 0.5
dsr_min: 0.05
output_dir: validation/outputs
