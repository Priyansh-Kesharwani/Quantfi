  normalization_sigmoid_k: 1.0
  windows_hmm_regime: 252
  indicator_min_history_rows: 200
  backtest_buy_dip_threshold_default: 60

allow_production_mode: false
regime_threshold: null
regime_threshold_type: "hard"
hmm:
  n_states: 2
  emission_type: "gaussian"
  window: 252
  jump_penalty: null
  seed: 42
S_scale: null
committee_method: "mean"
committee_trim_pct: 0.1
g_pers_type: "sigmoid_canonical"
g_pers_params:
  k: 10.0
  H_neutral: 0.5
  H_favorable: null
  H_unfavorable: null
normalization:
  min_obs: 100
  sigmoid_k: 1.0
  polarity:
    trend: true
    undervaluation: true
    volatility: true
    liquidity: true
    coupling: true
    hurst: true
windows:
  hurst: 252
  hmm_regime: 252
  vwap: 20
  volatility: 21
  vol_percentile: 252
  liquidity: 21
  liquidity_pct: 252
  coupling: 63
logging:
