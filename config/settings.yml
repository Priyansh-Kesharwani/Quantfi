# --- Consolidated from former phaseA / phaseB / phase3 / phase_refactor YAMLs ---
seed: 42

determinism:
  rng_seed: 42

normalization:
  min_obs: 100
  sigmoid_k: 1.0
  ecdf_clip_lo: 0.001
  ecdf_clip_hi: 0.999
  polarity:
    trend: true
    undervaluation: true
    volatility: true
    liquidity: true
    coupling: true
    hurst: true

ofi:
  window: 20
  normalize: true
  polarity: 1

hawkes:
  decay: 1.0
  dt: 1.0
  max_iter: 200
  mu_init: 0.1
  alpha_init: 0.5
  tol: 1.0e-6

ldc:
  kappa: 1.0
  gamma_default: 1.0
  feature_window: 5

composite:
  entry:
    committee_method: "trimmed_mean"
    committee_trim_pct: 0.1
    regime_threshold: null
    regime_threshold_type: "hard"
    S_scale: 1.0
    g_pers_type: "sigmoid_canonical"
    g_pers_params:
      k: 10.0
      H_neutral: 0.5
      H_favorable: null
      H_unfavorable: null
  exit:
    gamma_1: 0.4
    gamma_2: 0.35
    gamma_3: 0.25
    S_scale_exit: 1.0
  trim_frac: 0.1
  r_thresh: 0.2
  S_scale: 1.0
  k_pers: 6.0

snapshots:
  output_dir: "data_snapshots"
  verification_file: "verification_snapshot.parquet"

exit:
  gamma1: 1.0
  gamma2: 1.0
  gamma3: 1.0

indicators:
  ofi:
    window: 20
  vwap_z:
    vol_window: 60
  hurst:
    method: dfa
    window: 200

weighting:
  method: ic_ewma
  ic_window: 252
  ic_forward_horizon: 20
  alpha: 5.0
  lambda_shrink: 0.2
  max_weight_delta: 0.1

testing:
  hawkes_rmse_tol: 0.5
  ic_min_threshold: 0.03

data:
  provider: "yfinance"
  raw_data_dir: "raw_data"
  symbols:
    - "SPY"
    - "AAPL"
    - "GLD"
  interval: "1d"
  min_history_years: 10
  required_columns:
    - "open"
    - "high"
    - "low"
    - "close"
    - "volume"
  max_nan_pct: 0.001
  bar_interval_tolerance: 0.05
  providers:
    primary: "yfinance"
    fallback: ["alpha_vantage"]
  snapshot_dir: "data_snapshots"
  raw_dir: "raw_data"
  assets:
    - symbol: "SPY"
      intervals: ["1d"]
      min_history_years: 10
    - symbol: "AAPL"
      intervals: ["1d"]
      min_history_years: 10
    - symbol: "GLD"
      intervals: ["1d"]
      min_history_years: 10

walkforward:
  train_window: 756
  test_window: 252
  slide_window: 252
  expanding: true
  overlap: false
  embargo_pct: 0.01
  forward_windows: [5, 10, 20]
  entry_threshold: 70
  exit_threshold: 70

inner_cv:
  n_splits: 5
  embargo_bars: 20

kfold:
  n_splits: 5
  embargo_bars: 20
  shuffle: false

tuning:
  method: "random_search"
  n_trials: 50
  lambda_var: 0.5
  objective: "sortino"
  search_space:
    lookback_short: [10, 20, 40]
    lookback_medium: [40, 80, 120]
    lookback_long: [120, 200, 252]
    k_pers: [1.0, 3.0, 5.0, 8.0, 10.0, 12.0]
    S_scale: [0.5, 0.8, 1.0, 1.2, 1.5, 2.0, 3.0]
    S_scale_exit: [0.5, 0.8, 1.0, 1.2, 1.5, 2.0, 3.0]
    ofi_window: [5, 10, 20, 40, 60]
    ldc_kappa: [0.5, 1.0, 2.0, 3.0]
    ldc_feature_window: [3, 5, 8, 16, 32]
    hawkes_decay: [0.5, 1.0, 2.0, 5.0]

execution:
  slippage:
    k_impact: 0.001
    gamma: 0.5
    sigma_slip: 0.0001
    order_size_pct: 0.01
  latency:
    mean_latency_ms: 50
    jitter: true
  transaction_costs:
    commission_bps: 2.0
    spread_bps: 1.0

hawkes_stress:
  regimes:
    - name: "bursty"
      mu: 0.1
      alpha: 0.8
      beta: 1.0
      T: 500.0
    - name: "dense"
      mu: 3.0
      alpha: 0.1
      beta: 1.0
      T: 500.0
    - name: "near_critical"
      mu: 0.5
      alpha: 0.98
      beta: 1.0
      T: 500.0
    - name: "sparse"
      mu: 0.02
      alpha: 0.3
      beta: 1.0
      T: 500.0
  rmse_threshold: 0.10
  lob_depth_levels: 5

hawkes_sim:
  regimes:
    - name: "bursty"
      mu: 0.1
      alpha: 0.8
      beta: 1.0
      T: 200.0
    - name: "near_poisson"
      mu: 2.0
      alpha: 0.05
      beta: 1.0
      T: 200.0
    - name: "explosive_edge"
      mu: 0.5
      alpha: 0.95
      beta: 1.0
      T: 200.0
    - name: "sparse_events"
      mu: 0.05
      alpha: 0.3
      beta: 1.0
      T: 200.0
  rmse_threshold: 0.10
  min_events_stability: 50

robustness:
  subsample_fraction: 0.5
  subsample_n_trials: 20
  block_bootstrap_n: 200
  block_bootstrap_block_size: 20
  threshold_sweep: [50, 55, 60, 65, 70, 75, 80, 85, 90]
  ablation_components:
    - "ofi"
    - "hawkes"
    - "ldc"
    - "hurst"
  adversarial:
    sparse_volume_fraction: 0.1
    gap_fraction: 0.05
    ofi_spike_magnitude: 10.0

scoring:
  entry_threshold: 70
  exit_threshold: 70
  forward_horizons: [5, 10, 20]

metrics:
  score_metrics:
    - "information_coefficient"
    - "hit_rate"
    - "sortino"
    - "max_drawdown"
    - "cagr"
  signal_metrics:
    - "avg_holding_period"
    - "entry_latency"
    - "exit_lead"
    - "roi_per_trade"
    - "win_loss_ratio"
    - "profit_factor"

reporting:
  output_dir: "validation/reports"
  format: "html"
  metrics_dir: "validation/metrics"
  tuning_dir: "validation/outputs"

output:
  results_dir: "validation/outputs"
  metrics_format: "json"

resources:
  base_timeout_s: 30
  per_bar_timeout_s: 0.005
  max_parallel_folds: 4
  max_memory_gb: 8
