  fixture_path: "tests/fixtures/"
  api_keys:
    newsapi: null
    mcx: null
    nse: null
  symbol_aliases:
    GOLD: "GC=F"
    SILVER: "SI=F"
    XAU: "GC=F"
    XAG: "SI=F"
    NIFTY: "^NSEI"
    NIFTY50: "^NSEI"
    SENSEX: "^BSESN"
  exchange_suffixes:
    NSE: ".NS"
