# CPCV + MFBO tuning for the adaptive bot (TBL exit)
# Phase 1 (positive GT): set cost_free: true, gt_benchmark_scale: -0.5 → run until Mean GT-Score > 0
# Phase 2 (test with costs): set cost_free: false, gt_benchmark_scale: 1.0 → run to test with slippage/fees
# Usage: python scripts/tune.py --config config/tuning_cpcv_bot.yml --output-dir validation/outputs --seed 42

data:
  symbols: ["SPY", "AAPL"]
  start_date: "2018-01-01"
  end_date: "2024-01-01"

cpcv:
  n_folds: 5
  k_test: 2
  horizon_bars: 20
  embargo_bars: 24

use_bot: true
initial_capital: 100000
slippage_bps: 5.0
cost_free: false   # test with costs (slippage + fees)
gt_benchmark_scale: 1.0   # full B&H benchmark for test

mfbo:
  n_trials: 80
  search_space:
    entry_score_threshold: [50, 55, 60, 65, 70]
    max_positions: [10, 15, 20]
    kappa_tp: [1.5, 2.0, 2.5, 3.0]
    kappa_sl: [1.0, 1.5, 2.0]
    T_max: [30, 50, 70]
  fidelity_spec:
    low:
      cost: 1.0
    high:
      cost: 5.0

dsr_min: 0.05
output_dir: validation/outputs
