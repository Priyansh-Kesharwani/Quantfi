# Expanded parameter tuning: entry, exits, slippage, positions
# Usage: python scripts/tune.py --config config/tuning_cpcv_tuned.yml [--output-dir DIR] [--seed N]

data:
  symbols: ["SPY", "AAPL"]
  start_date: "2018-01-01"
  end_date: "2024-01-01"

cpcv:
  n_folds: 5
  k_test: 2
  horizon_bars: 20
  embargo_bars: 24

mfbo:
  n_trials: 30
  search_space:
    entry_score_threshold: [58, 62, 66, 70, 74, 78]
    max_positions: [4, 6, 8, 10, 12, 15]
    slippage_bps: [3, 5, 8, 12]
    atr_trail_mult: [2.0, 2.5, 3.0]
    score_rel_mult: [0.35, 0.4, 0.5]
    score_abs_floor: [30, 35, 40]
    max_holding_days: [20, 25, 30]
  fidelity_spec:
    low:
      cost: 1.0
    high:
      cost: 5.0

dsr_min: 0.05
output_dir: validation/outputs
