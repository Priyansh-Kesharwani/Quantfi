# ============================================================
# Phase B — Robust Validation & Simulation Framework Config
# ============================================================

seed: 42

# ── Data Ingestion ────────────────────────────────────────
data:
  provider: "yfinance"                  # yfinance | polygon | alpha_vantage
  raw_data_dir: "raw_data"
  symbols:
    - "SPY"
    - "AAPL"
    - "GLD"
  interval: "1d"
  min_history_years: 10
  required_columns:
    - "open"
    - "high"
    - "low"
    - "close"
    - "volume"
  max_nan_pct: 0.001                    # 0.1% max allowed NaN
  bar_interval_tolerance: 0.05          # ±5% bar spacing tolerance

# ── Walk-Forward Validation ───────────────────────────────
walkforward:
  train_window: 756                     # ~3 years of trading days
  test_window: 252                      # ~1 year
  overlap: false
  expanding: true
  embargo_pct: 0.02
  forward_windows: [5, 10, 20]          # forward-return horizons (bars)
  entry_threshold: 70                   # Entry_Score > this → signal
  exit_threshold: 70                    # Exit_Score > this → exit signal

# ── Purged K-Fold CV ──────────────────────────────────────
kfold:
  n_splits: 5
  embargo_bars: 20
  shuffle: false                        # preserve temporal order

# ── Hawkes Simulation ─────────────────────────────────────
hawkes_sim:
  regimes:
    - name: "bursty"
      mu: 0.1
      alpha: 0.8
      beta: 1.0
      T: 200.0
    - name: "near_poisson"
      mu: 2.0
      alpha: 0.05
      beta: 1.0
      T: 200.0
    - name: "explosive_edge"
      mu: 0.5
      alpha: 0.95
      beta: 1.0
      T: 200.0
    - name: "sparse_events"
      mu: 0.05
      alpha: 0.3
      beta: 1.0
      T: 200.0
  rmse_threshold: 0.10                  # max 10% RMSE vs ground truth
  min_events_stability: 50              # test MLE stability below this

# ── Metrics ───────────────────────────────────────────────
metrics:
  score_metrics:
    - "information_coefficient"
    - "hit_rate"
    - "sortino"
    - "max_drawdown"
    - "cagr"
  signal_metrics:
    - "avg_holding_period"
    - "entry_latency"
    - "exit_lead"
    - "roi_per_trade"
    - "win_loss_ratio"
    - "profit_factor"

# ── Reporting ─────────────────────────────────────────────
reporting:
  output_dir: "validation/reports"
  format: "html"

# ── Output ────────────────────────────────────────────────
output:
  results_dir: "validation/outputs"
  metrics_format: "json"
