# Phase 1 Configuration
# =====================
# Composite DCA State Score Configuration
#
# MATHEMATICAL FRAMEWORK:
# -----------------------
# Gate_t = C_t × L_t × 𝟙[R_t ≥ r_thresh]
# Opp_t = Mean([T_t, U_t × g_pers(H_t)])
# RawFavor_t = Opp_t × Gate_t
# CompositeScore_t = 100 × clip(0.5 + (RawFavor_t − 0.5) × S_scale, 0, 1)
#
# where:
#   g_pers(H_t) = Sigmoid(H_t - 0.5) × 2
#   𝟙[·] = indicator function (1 if condition true, else 0)
#
# NON-NEGOTIABLE RULES:
# - DO NOT set numeric weights or thresholds here
# - All values are SYMBOLIC PLACEHOLDERS until Phase 2 tuning
# - Phase 2 will determine optimal values via walk-forward backtests
#
# Author: Phase 1 Implementation
# Date: 2026-02-07

# =============================================================================
# SAFETY FLAGS
# =============================================================================

# CRITICAL: Set to false to prevent accidental production use
# Must be explicitly set to true after Phase 2 validation
allow_production_mode: false

# =============================================================================
# REGIME DETECTION
# =============================================================================

# Threshold for regime probability in Gate calculation
# Gate_t includes: 𝟙[R_t ≥ r_thresh] where 𝟙 is indicator function
# R_t must exceed this threshold for favorable gate (else Gate=0)
# SYMBOLIC PLACEHOLDER - will be tuned in Phase 2
# Candidates to explore: 0.4, 0.5, 0.6
regime_threshold: null  # TODO Phase 2: Tune via sensitivity analysis

# Threshold type for regime gating
# "hard": 𝟙[R_t ≥ threshold] = 1 or 0 (canonical indicator function)
# "soft": sigmoid transition (smoother but less decisive)
regime_threshold_type: "hard"

# HMM Configuration
hmm:
  n_states: 2  # Number of regime states
  emission_type: "gaussian"  # TODO Phase 2: Replace with "student_t" for heavier tails
  window: 252  # Rolling window for regime detection
  jump_penalty: null  # TODO Phase 2: Add jump penalty for regime stability
  seed: 42  # Random seed for reproducibility

# =============================================================================
# COMPOSITE SCORE
# =============================================================================

# Scale parameter for final score transformation
# Controls sensitivity of score around the neutral point (50)
# CompositeScore = 100 * clip(0.5 + (RawFavor - 0.5) * S_scale, 0, 1)
# SYMBOLIC PLACEHOLDER - will be tuned in Phase 2
# Candidates: 0.5 (compressed), 1.0 (linear), 2.0 (expanded)
S_scale: null  # TODO Phase 2: Tune via score distribution analysis

# Committee aggregation for Opportunity calculation
# CANONICAL FORMULA: Opp_t = Mean([T_t, U_t × g_pers(H_t)])
# "mean": Simple arithmetic mean (canonical)
# "trimmed_mean": Robust to outliers
committee_method: "mean"  # Canonical uses simple mean
committee_trim_pct: 0.1  # Fraction trimmed (for trimmed_mean)

# =============================================================================
# PERSISTENCE MODIFIER (g_pers)
# =============================================================================

# CANONICAL FORMULA: g_pers(H_t) = Sigmoid(H_t - 0.5) × 2
# This maps:
#   H = 0.5 (random walk) → g ≈ 0.5 (neutral)
#   H > 0.5 (persistent)  → g > 0.5 (boost undervaluation signal)
#   H < 0.5 (mean-revert) → g < 0.5 (suppress undervaluation signal)

# Function type for mapping Hurst exponent to weight
# "sigmoid_canonical": g_pers(H) = Sigmoid(H - 0.5) × 2 (CANONICAL)
# "sigmoid": General sigmoid with configurable center
# "linear": Linear interpolation between bounds
# "threshold": Binary threshold
g_pers_type: "sigmoid_canonical"  # Canonical formula

# Parameters for g_pers function
g_pers_params:
  # Sigmoid steepness (controls sensitivity around H=0.5)
  # Higher k = sharper transition
  k: 10.0  # Reasonable default, can be tuned in Phase 2
  
  # Center point for sigmoid (canonical = 0.5)
  H_neutral: 0.5
  
  # For linear type only:
  H_favorable: null  # TODO Phase 2: Typically H > 0.6
  H_unfavorable: null  # TODO Phase 2: Typically H < 0.4

# =============================================================================
# NORMALIZATION PIPELINE
# =============================================================================

normalization:
  # Minimum observations before computing expanding percentile
  min_obs: 100
  
  # Sigmoid steepness parameter for Z → [0,1] transformation
  sigmoid_k: 1.0
  
  # Per-indicator polarity (true = higher raw value is favorable)
  polarity:
    trend: true           # Higher trend score = favorable
    undervaluation: true  # Higher undervaluation = favorable (already inverted from Z)
    volatility: true      # Lower vol = favorable (score is inverted)
    liquidity: true       # Higher liquidity = favorable
    coupling: true        # Lower coupling = favorable (score is inverted)
    hurst: true           # Higher H (persistence) = favorable for trending

# =============================================================================
# INDICATOR WINDOWS
# =============================================================================

windows:
  hurst: 252             # Rolling window for Hurst estimation
  hmm_regime: 252        # Window for HMM regime detection
  vwap: 20               # VWAP calculation window
  volatility: 21         # Realized volatility window
  vol_percentile: 252    # Lookback for volatility percentile
  liquidity: 21          # Amihud illiquidity window
  liquidity_pct: 252     # Lookback for liquidity percentile
  coupling: 63           # Window for coupling covariance

# =============================================================================
# LOGGING & AUDIT TRAIL
# =============================================================================

logging:
  # Whether to log all intermediate values for each computation
  log_intermediates: true
  
  # Path for indicator computation logs (relative to project root)
  log_path: "logs/phase1_indicator_runs.json"
  
  # Verbosity level: debug, info, warning, error
  level: "info"

# =============================================================================
# DATA PROVIDERS (Phase 1 uses fixtures)
# =============================================================================

data_providers:
  # Use fixture data instead of live APIs
  use_fixtures: true
  fixture_path: "tests/fixtures/"
  
  # Provider API keys - LEAVE EMPTY for Phase 1
  # TODO: Fill in for production (Phase 2+)
  api_keys:
    # yfinance doesn't need a key
    newsapi: null  # TODO: Get from newsapi.org
    # TODO Phase 2: Add MCX/NSE data provider keys
    mcx: null
    nse: null

