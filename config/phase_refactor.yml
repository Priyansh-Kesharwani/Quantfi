# ============================================================
# Phase Refactor — Research-grade composite and validation
# ============================================================
# All knobs for canonical normalizer, indicators, composite,
# weighting, and testing. No numeric weights hard-coded in code.
# ============================================================

determinism:
  rng_seed: 42

normalization:
  mode: exact
  k: 1.0
  eps: 1e-9

indicators:
  ofi:
    window: 20
  vwap_z:
    vol_window: 60
  hurst:
    method: dfa
    window: 200

weighting:
  method: ic_ewma
  ic_window: 252
  ic_forward_horizon: 20
  alpha: 5.0
  lambda_shrink: 0.2
  max_weight_delta: 0.1

composite:
  trim_frac: 0.1
  r_thresh: 0.2
  S_scale: 1.0
  k_pers: 6.0

exit:
  gamma1: 1.0
  gamma2: 1.0
  gamma3: 1.0

testing:
  # Hawkes λ estimator: relative RMSE tolerance (0.5 allows current MLE; tighten for production)
  hawkes_rmse_tol: 0.5
  ic_min_threshold: 0.03
