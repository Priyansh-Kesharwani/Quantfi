# Widened grid, more trials (Experiment 2)
# Usage: python3 scripts/tune.py --config config/tuning_cpcv_wide.yml --output-dir validation/outputs/wide --seed 42

data:
  symbols: ["SPY", "AAPL"]
  start_date: "2018-01-01"
  end_date: "2024-01-01"

cpcv:
  n_folds: 5
  k_test: 2
  horizon_bars: 20
  embargo_bars: 24

mfbo:
  n_trials: 100
  search_space:
    entry_score_threshold: [50, 55, 60, 65, 70, 75, 80]
    max_positions: [3, 5, 10, 15, 20]
  fidelity_spec:
    low:
      cost: 1.0
    high:
      cost: 5.0

dsr_min: 0.05
output_dir: validation/outputs/wide
